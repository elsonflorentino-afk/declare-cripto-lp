<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>C7 Peça B — Convite Pessoal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #1a1a1a;
  font-family: 'Sora', sans-serif;
}
.ad {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  background: #000;
}
.photo {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 50%;
  background-image: url('af-258-1080.jpg');
  background-size: cover;
  background-position: center 22%;
  filter: contrast(1.08) brightness(0.98) saturate(1.05);
}
.photo::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 40%;
  background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.95) 100%);
}
.overlay {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 54%;
  background: #000000;
  padding: 60px 80px 68px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
}
.line-30min {
  font-family: 'Sora', sans-serif;
  font-weight: 800;
  font-size: 78px;
  line-height: 0.95;
  color: #FFFFFF;
  letter-spacing: -2px;
  margin-bottom: 38px;
}
.line-carteira {
  font-family: 'Sora', sans-serif;
  font-weight: 800;
  font-size: 52px;
  line-height: 1.05;
  color: #FFFFFF;
  letter-spacing: -1.5px;
  margin-bottom: 4px;
}
.line-cripto {
  font-family: 'Sora', sans-serif;
  font-weight: 800;
  font-size: 52px;
  line-height: 1.05;
  color: #FFFFFF;
  letter-spacing: -1.5px;
  margin-bottom: 32px;
}
.line-olho {
  font-family: 'Sora', sans-serif;
  font-weight: 800;
  font-size: 84px;
  line-height: 1.0;
  color: #00B37E;
  letter-spacing: -3px;
}
.assinatura {
  margin-top: 28px;
  font-family: 'Sora', sans-serif;
  font-weight: 500;
  font-size: 22px;
  color: #A0A0C0;
  letter-spacing: 0.5px;
}
.assinatura strong {
  color: #FFFFFF;
  font-weight: 700;
}
.badge {
  position: absolute;
  top: 40px;
  left: 40px;
  padding: 12px 20px;
  background: rgba(0, 0, 0, 0.55);
  border-radius: 100px;
  color: #FFFFFF;
  font-weight: 700;
  font-size: 22px;
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  gap: 8px;
}
.badge .dot {
  width: 10px;
  height: 10px;
  background: #00B37E;
  border-radius: 50%;
}
</style>
</head>
<body>
<div class="ad">
  <div class="photo"></div>
  <div class="badge"><span class="dot"></span>@boostresearch</div>
  <div class="overlay">
    <div class="line-30min">30 MINUTOS.</div>
    <div class="line-carteira">SUA CARTEIRA</div>
    <div class="line-cripto">CRIPTO.</div>
    <div class="line-olho">EU OLHO.</div>
    <div class="assinatura">— <strong>ANDRÉ FRANCO</strong>, BOOST RESEARCH</div>
  </div>
</div>
</body>
</html>
